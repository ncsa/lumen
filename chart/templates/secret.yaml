{{- if not .Values.existingSecret }}
{{- if eq (.Values.config.secretKey | default "") "" }}
{{- fail "config.secretKey is required when existingSecret is not set" }}
{{- end }}
{{- if eq (.Values.config.encryptionKey | default "") "" }}
{{- fail "config.encryptionKey is required when existingSecret is not set" }}
{{- end }}
{{- if eq (.Values.oauth2.clientId | default "") "" }}
{{- fail "oauth2.clientId is required when existingSecret is not set" }}
{{- end }}
{{- if eq (.Values.oauth2.clientSecret | default "") "" }}
{{- fail "oauth2.clientSecret is required when existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumen.fullname" . }}
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  secret-key: {{ .Values.config.secretKey | b64enc | quote }}
  encryption-key: {{ .Values.config.encryptionKey | b64enc | quote }}
  oauth2-client-id: {{ .Values.oauth2.clientId | b64enc | quote }}
  oauth2-client-secret: {{ .Values.oauth2.clientSecret | b64enc | quote }}
  {{- if not .Values.postgresql.existingSecret }}
  database-url: {{ include "lumen.databaseUrl" . | b64enc | quote }}
  {{- end }}
{{- end }}
