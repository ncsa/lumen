apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lumen.fullname" . }}-migrate
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "lumen.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              DB_HOST=$(echo $DATABASE_URL | sed 's|.*@\([^:/]*\).*|\1|')
              DB_PORT=$(echo $DATABASE_URL | sed 's|.*:\([0-9]*\)/.*|\1|')
              DB_PORT=${DB_PORT:-5432}
              echo "Waiting for $DB_HOST:$DB_PORT..."
              until nc -z "$DB_HOST" "$DB_PORT"; do
                echo "database not ready, sleeping 2s"
                sleep 2
              done
              echo "database is reachable"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.databaseSecretName" . }}
                  key: {{ include "lumen.databaseSecretKey" . }}
      containers:
        - name: migrate
          image: {{ include "lumen.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - uv
            - run
            - --no-sync
            - flask
            - --app
            - run
            - db
            - upgrade
          env:
            - name: CONFIG_YAML
              value: /app/config/config.yaml
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.databaseSecretName" . }}
                  key: {{ include "lumen.databaseSecretKey" . }}
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: {{ include "lumen.fullname" . }}-config
