{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
{{- if eq (.Values.postgresql.auth.password | default "") "" }}
{{- fail "postgresql.auth.password is required when postgresql.enabled=true and postgresql.auth.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumen.fullname" . }}-postgresql
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  postgres-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
