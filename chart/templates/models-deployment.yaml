{{- $root := . }}
{{- range .Values.models }}
{{- $replicas := int (.replicas | default 0) }}
{{- if gt $replicas 0 }}
{{- $engine := .engine | default "vllm" }}
{{- $defaultPort := 8000 }}
{{- $port := int (.port | default $defaultPort) }}
{{- $modelResourceName := printf "%s-model-%s" $root.Release.Name .name | trunc 63 | trimSuffix "-" }}
{{- $gpu := .gpu | default dict }}
{{- $storage := .storage | default dict }}
{{- $hc := .healthCheck | default dict }}
{{- $storageMount := $storage.mountPath | default "/mnt/pvc" }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $modelResourceName }}-secret
  labels:
    {{- include "lumen.labels" $root | nindent 4 }}
    app.kubernetes.io/component: model
    lumen.ncsa.illinois.edu/model: {{ .name | quote }}
type: Opaque
data:
  api-key: {{ .apiKey | default "" | b64enc | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $modelResourceName }}
  labels:
    {{- include "lumen.labels" $root | nindent 4 }}
    app.kubernetes.io/component: model
    lumen.ncsa.illinois.edu/model: {{ .name | quote }}
    lumen.ncsa.illinois.edu/engine: {{ $engine | quote }}
  annotations:
    checksum/config: {{ include (print $root.Template.BasePath "/config-secret.yaml") $root | sha256sum }}
spec:
  replicas: {{ $replicas }}
  strategy:
    type: {{ .updateStrategy | default "Recreate" }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      lumen.ncsa.illinois.edu/model: {{ .name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        lumen.ncsa.illinois.edu/model: {{ .name | quote }}
        lumen.ncsa.illinois.edu/engine: {{ $engine | quote }}
    spec:
      {{- if and ($gpu.enabled | default false) ($gpu.runtimeClassName) }}
      runtimeClassName: {{ $gpu.runtimeClassName }}
      {{- end }}
      {{- if $gpu.tolerations }}
      tolerations:
        {{- toYaml $gpu.tolerations | nindent 8 }}
      {{- end }}
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: {{ $engine }}
          {{- if not .image }}
          {{- fail (printf "models[%s].image is required — pin an explicit tag, e.g. vllm/vllm-openai:v0.9.1 or lmsysorg/sglang:v0.5.11-cu129-runtime" .name) }}
          {{- end }}
          {{- if eq $engine "vllm" }}
          image: {{ .image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - vllm
            - serve
            - {{ .model | quote }}
            - "--host=0.0.0.0"
            - {{ printf "--port=%d" $port | quote }}
            {{- if $storage.enabled | default false }}
            - {{ printf "--download-dir=%s" $storageMount | quote }}
            {{- end }}
            - "--api-key=$(MODEL_API_KEY)"
            {{- range .extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- else if eq $engine "sglang" }}
          image: {{ .image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - /bin/sh
            - -c
            - |
              pip install distro --quiet &&
              python3 -m sglang.launch_server \
                --model-path {{ .model | quote }} \
                --host 0.0.0.0 \
                --port {{ $port }} \
                --api-key "$(MODEL_API_KEY)" \
                {{- if $storage.enabled | default false }}
                --cache-dir {{ $storageMount }} \
                {{- end }}
                {{- range .extraArgs }}
                {{ . }} \
                {{- end }}
                --tp 1
          {{- else }}
          {{- fail (printf "models[%s].engine must be \"vllm\" or \"sglang\", got %q" .name $engine) }}
          {{- end }}
          env:
            - name: MODEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $modelResourceName }}-secret
                  key: api-key
            - name: HF_HOME
              value: {{ printf "%s/huggingface" $storageMount | quote }}
            {{- if eq $engine "sglang" }}
            - name: SGLANG_CACHE_DIR
              value: {{ printf "%s/sglang_cache" $storageMount | quote }}
            {{- end }}
            {{- if .hfToken }}
            {{- if .hfToken.secretName }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .hfToken.secretName }}
                  key: {{ .hfToken.secretKey | default "HF_TOKEN" }}
            {{- end }}
            {{- end }}
            {{- range $key, $val := .extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $port }}
              protocol: TCP
          {{- if or ($gpu.enabled | default false) .resources }}
          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else if $gpu.enabled | default false }}
            limits:
              nvidia.com/gpu: {{ $gpu.count | default 1 }}
            requests:
              nvidia.com/gpu: {{ $gpu.count | default 1 }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            {{- if $storage.enabled | default false }}
            - name: model-storage
              mountPath: {{ $storageMount }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ $hc.startupInitialDelay | default 30 }}
            periodSeconds: {{ $hc.startupPeriod | default 30 }}
            failureThreshold: {{ $hc.startupFailureThreshold | default 60 }}
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ $hc.livenessInitialDelay | default 120 }}
            periodSeconds: {{ $hc.livenessPeriod | default 15 }}
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              {{- if eq $engine "sglang" }}
              path: /health_generate
              {{- else }}
              path: /health
              {{- end }}
              port: http
            initialDelaySeconds: {{ $hc.readinessInitialDelay | default 120 }}
            periodSeconds: {{ $hc.readinessPeriod | default 15 }}
            failureThreshold: 3
            timeoutSeconds: 10
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .shmSize | default "10Gi" }}
        {{- if $storage.enabled | default false }}
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ $storage.existingClaim | default (printf "%s-model-%s" $root.Release.Name .name | trunc 63 | trimSuffix "-") }}
        {{- end }}
{{- end }}
{{- end }}
