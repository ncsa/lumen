apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumen.fullname" . }}-config
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  config.yaml: |
    app:
      debug: {{ .Values.config.debug }}
      theme: {{ .Values.config.theme | default "default" | quote }}
      db_pool:
        pool_size: {{ .Values.config.dbPool.poolSize }}
        max_overflow: {{ .Values.config.dbPool.maxOverflow }}
        pool_timeout: {{ .Values.config.dbPool.poolTimeout }}
        pool_recycle: {{ .Values.config.dbPool.poolRecycle }}
        pool_pre_ping: {{ .Values.config.dbPool.poolPrePing }}

    oauth2:
      server_metadata_url: {{ .Values.oauth2.serverMetadataUrl | quote }}
      redirect_uri: {{ include "lumen.redirectUri" . | quote }}
      scopes: {{ .Values.oauth2.scopes | quote }}

    rate_limiting:
      limit: {{ .Values.config.rateLimiting.limit | quote }}
    {{- $redisUrl := include "lumen.redisUrl" . }}
    {{- if $redisUrl }}
      storage_url: {{ $redisUrl | quote }}
    {{- end }}

    admins:
    {{- if .Values.config.admins }}
    {{- range .Values.config.admins }}
      - {{ . | quote }}
    {{- end }}
    {{- else }}
      []
    {{- end }}

    models:
    {{- $root := . }}
    {{- if .Values.models }}
    {{- range .Values.models }}
      - name: {{ .name | quote }}
        {{- $lumen := .lumen | default dict }}
        active: {{ $lumen.active | default true }}
        input_cost_per_million: {{ $lumen.inputCostPerMillion | default 0 }}
        output_cost_per_million: {{ $lumen.outputCostPerMillion | default 0 }}
        {{- if $lumen.contextWindow }}
        context_window: {{ $lumen.contextWindow }}
        {{- end }}
        {{- if $lumen.maxOutputTokens }}
        max_output_tokens: {{ $lumen.maxOutputTokens }}
        {{- end }}
        {{- if $lumen.description }}
        description: {{ $lumen.description | quote }}
        {{- end }}
        endpoints:
          - model: {{ .model | quote }}
            api_key: {{ .apiKey | default "" | quote }}
            {{- if gt (int (.replicas | default 0)) 0 }}
            {{- $defaultPort := 8000 }}
            {{- $port := int (.port | default $defaultPort) }}
            url: {{ printf "http://%s-model-%s:%d/v1" $root.Release.Name .name $port | quote }}
            {{- else }}
            url: {{ .url | quote }}
            {{- end }}
    {{- end }}
    {{- else }}
      []
    {{- end }}
