apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumen.fullname" . }}-config
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  config.yaml: |
    version: 2

    app:
      debug: {{ .Values.config.debug }}
      config_editor: {{ .Values.config.configEditor | default false }}
      theme: {{ .Values.config.theme | default "default" | quote }}
      {{- if .Values.config.name }}
      name: {{ .Values.config.name | quote }}
      {{- end }}
      {{- if .Values.config.tagline }}
      tagline: {{ .Values.config.tagline | quote }}
      {{- end }}
      {{- if .Values.config.announcement }}
      announcement: |
        {{- .Values.config.announcement | nindent 8 }}
      {{- end }}
      {{- if .Values.config.emailThemes }}
      email_themes:
        {{- toYaml .Values.config.emailThemes | nindent 8 }}
      {{- end }}
      logs:
        level: {{ .Values.config.logs.level | default "info" | quote }}
        access: {{ .Values.config.logs.access | default false }}
        model: {{ .Values.config.logs.model | default false }}
      database:
        {{- with .Values.config.database.poolSize }}
        pool_size: {{ . }}
        {{- end }}
        {{- with .Values.config.database.maxOverflow }}
        max_overflow: {{ . }}
        {{- end }}
        {{- with .Values.config.database.maxConnections }}
        max_connections: {{ . }}
        {{- end }}
        pool_timeout: {{ .Values.config.database.poolTimeout }}
        pool_recycle: {{ .Values.config.database.poolRecycle }}

    oauth2:
      server_metadata_url: {{ .Values.oauth2.serverMetadataUrl | quote }}
      redirect_uri: {{ include "lumen.redirectUri" . | quote }}
      scopes: {{ .Values.oauth2.scopes | quote }}
      allow_unverified_email: {{ .Values.oauth2.allowUnverifiedEmail }}
      {{- if .Values.oauth2.params }}
      params:
        {{- toYaml .Values.oauth2.params | nindent 8 }}
      {{- end }}

    rate_limiting:
      limit: {{ .Values.config.rateLimiting.limit | quote }}
    {{- $redisUrl := include "lumen.redisUrl" . }}
    {{- if $redisUrl }}
      storage_url: {{ $redisUrl | quote }}
    {{- end }}

    admins:
    {{- if .Values.config.admins }}
    {{- range .Values.config.admins }}
      - {{ . | quote }}
    {{- end }}
    {{- else }}
      []
    {{- end }}

    api:
      consent: {{ .Values.api.consent }}
      prometheus:
        enabled: {{ .Values.api.prometheus.enabled }}
        {{- if .Values.api.prometheus.token }}
        token: {{ .Values.api.prometheus.token | quote }}
        {{- end }}
        {{- if .Values.api.prometheus.multiprocDir }}
        multiproc_dir: {{ .Values.api.prometheus.multiprocDir | quote }}
        {{- end }}
      {{- if .Values.api.monitoring.token }}
      monitoring:
        token: {{ .Values.api.monitoring.token | quote }}
      {{- end }}

    defaults:
      models:
        access: {{ ((.Values.config.defaults).models).access | default "blocked" | quote }}
        {{- if ((.Values.config.defaults).models).ackMessage }}
        ack_message: {{ ((.Values.config.defaults).models).ackMessage | quote }}
        {{- end }}
      tokens:
        max: {{ ((.Values.config.defaults).tokens).max | default 0 }}
        refresh: {{ ((.Values.config.defaults).tokens).refresh | default 0 }}
        starting: {{ ((.Values.config.defaults).tokens).starting | default 0 }}

    models:
    {{- $root := . }}
    {{- if .Values.models }}
    {{- range .Values.models }}
      - name: {{ .name | quote }}
        {{- $lumen := .lumen | default dict }}
        {{- if $lumen.access }}
        access: {{ $lumen.access | quote }}
        {{- end }}
        {{- if $lumen.needsAck }}
        needs_ack: {{ $lumen.needsAck }}
        {{- end }}
        {{- if or $lumen.disabled (and (hasKey $lumen "active") (not $lumen.active)) }}
        disabled: true
        {{- end }}
        {{- if $lumen.ackMessage }}
        ack_message: {{ $lumen.ackMessage | quote }}
        {{- end }}
        input_cost_per_million: {{ $lumen.inputCostPerMillion | default 0 }}
        output_cost_per_million: {{ $lumen.outputCostPerMillion | default 0 }}
        {{- if $lumen.audioCostPerHour }}
        audio_cost_per_hour: {{ $lumen.audioCostPerHour }}
        {{- end }}
        {{- if $lumen.contextWindow }}
        context_window: {{ $lumen.contextWindow }}
        {{- end }}
        {{- if $lumen.maxOutputTokens }}
        max_output_tokens: {{ $lumen.maxOutputTokens }}
        {{- end }}
        {{- if $lumen.description }}
        description: {{ $lumen.description | quote }}
        {{- end }}
        {{- if $lumen.url }}
        url: {{ $lumen.url | quote }}
        {{- end }}
        {{- if $lumen.knowledgeCutoff }}
        knowledge_cutoff: {{ $lumen.knowledgeCutoff | quote }}
        {{- end }}
        {{- if $lumen.supportsReasoning }}
        supports_reasoning: {{ $lumen.supportsReasoning }}
        {{- end }}
        {{- if $lumen.inputModalities }}
        input_modalities: {{ $lumen.inputModalities | toJson }}
        {{- end }}
        {{- if $lumen.outputModalities }}
        output_modalities: {{ $lumen.outputModalities | toJson }}
        {{- end }}
        endpoints:
          - model: {{ .model | quote }}
            api_key: {{ .apiKey | default "" | quote }}
            {{- if gt (int (.replicas | default 0)) 0 }}
            {{- $defaultPort := 8000 }}
            {{- $port := int (.port | default $defaultPort) }}
            url: {{ printf "http://%s-model-%s:%d/v1" $root.Release.Name .name $port | quote }}
            {{- else }}
            url: {{ .url | quote }}
            {{- end }}
    {{- end }}
    {{- else }}
      []
    {{- end }}

    {{- if .Values.groups }}
    groups:
    {{- range $name, $group := .Values.groups }}
      {{ $name }}:
        {{- if $group.rules }}
        rules:
        {{- range $group.rules }}
          - field: {{ .field | quote }}
            {{- if .contains }}
            contains: {{ .contains | quote }}
            {{- end }}
            {{- if .equals }}
            equals: {{ .equals | quote }}
            {{- end }}
        {{- end }}
        {{- end }}
        max: {{ $group.max | default 0 }}
        refresh: {{ $group.refresh | default 0 }}
        starting: {{ $group.starting | default 0 }}
        model_access:
          default: {{ ($group.modelAccess).default | default "blocked" | quote }}
          {{- if ($group.modelAccess).blocked }}
          blocked: {{ ($group.modelAccess).blocked | toJson }}
          {{- end }}
          {{- if ($group.modelAccess).allowed }}
          allowed: {{ ($group.modelAccess).allowed | toJson }}
          {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.config.extraConfig }}
    {{ .Values.config.extraConfig | nindent 4 }}
    {{- end }}
