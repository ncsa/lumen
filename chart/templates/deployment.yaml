apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lumen.fullname" . }}
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lumen.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config-secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "lumen.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "lumen.fullname" .) }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              DB_HOST=$(echo $DATABASE_URL | sed 's|.*@\([^:/]*\).*|\1|')
              DB_PORT=$(echo $DATABASE_URL | sed 's|.*:\([0-9]*\)/.*|\1|')
              DB_PORT=${DB_PORT:-5432}
              echo "Waiting for $DB_HOST:$DB_PORT..."
              until nc -z "$DB_HOST" "$DB_PORT"; do
                echo "database not ready, sleeping 2s"
                sleep 2
              done
              echo "database is reachable"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.databaseSecretName" . }}
                  key: {{ include "lumen.databaseSecretKey" . }}
      containers:
        - name: lumen
          securityContext:
            {{- if .Values.securityContext }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- else }}
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            {{- end }}
          image: {{ include "lumen.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: CONFIG_YAML
              value: /app/config/config.yaml
            - name: LUMEN_REPLICAS
              value: {{ .Values.replicaCount | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.databaseSecretName" . }}
                  key: {{ include "lumen.databaseSecretKey" . }}
            - name: LUMEN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.secretName" . }}
                  key: secret-key
            - name: LUMEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.secretName" . }}
                  key: encryption-key
            - name: OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.secretName" . }}
                  key: oauth2-client-id
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "lumen.secretName" . }}
                  key: oauth2-client-secret
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            {{- if .Values.resources }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 512Mi
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- range $name, $theme := .Values.config.themes }}
            - name: theme-{{ $name }}
              mountPath: {{ printf "/app/themes/%s" $name }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "lumen.fullname" . }}-config
        {{- range $name, $theme := .Values.config.themes }}
        - name: theme-{{ $name }}
          persistentVolumeClaim:
            claimName: {{ $theme.pvc }}
        {{- end }}
