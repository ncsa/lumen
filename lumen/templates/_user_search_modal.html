{# Reusable "search a user by name/email" modal (add manager, add config user). #}
{% macro user_search_modal(modal_id, title, input_id, list_id, confirm_id, confirm_label, help_text) %}
<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}-title" aria-modal="true" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5" id="{{ modal_id }}-title">{{ title }}</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small">{{ help_text }}</p>
        <div id="{{ input_id }}-result" role="alert" aria-live="assertive" class="mb-2"></div>
        <label for="{{ input_id }}" class="form-label">Name or email</label>
        <div class="position-relative">
          <input type="text" id="{{ input_id }}" class="form-control" placeholder="Type to search…"
                 role="combobox" aria-autocomplete="list" aria-expanded="false"
                 aria-controls="{{ list_id }}" autocomplete="off">
          <ul id="{{ list_id }}" role="listbox" aria-label="Matching users" class="dropdown-menu w-100 mb-0 p-0"></ul>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="{{ confirm_id }}">{{ confirm_label }}</button>
      </div>
    </div>
  </div>
</div>
{% endmacro %}
