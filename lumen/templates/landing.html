<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="stylesheet" href="https://cdn.toolkit.illinois.edu/3/toolkit.css">
  <script type="module" src="https://cdn.toolkit.illinois.edu/3/toolkit.js"></script>
  <script src="{{ url_for('static', filename='vendor/skipto/skipto.min.js') }}"
          data-skipto="colorTheme:illinois"></script>
</head>
<body class="bg-light">

<ilw-page class="ilw-margin ilw-font">
  <ilw-header slot="header" menu="none">
    <a slot="site-name" href="/">{{ app_name }}</a>
  </ilw-header>

  <main id="main-content" class="d-flex align-items-center justify-content-center" style="min-height:60vh">
    <div class="card shadow-sm p-5 text-center" style="max-width:420px;width:100%">
      <img src="{{ url_for('static', filename='img/block-i.png') }}" alt="University of Illinois Block I logo" style="height:80px;width:78px" class="mb-2 d-block mx-auto">
      <h1 class="mb-2 fw-bold">{{ app_name }}</h1>
      {% if app_tagline %}<p class="text-muted mb-4">{{ app_tagline }}</p>{% endif %}
      {% if has_provider %}
      <a href="{{ url_for('auth.login') }}" class="btn btn-login btn-lg w-100">Login with OAuth2</a>
      {% endif %}
      {% if has_dev %}
      <a href="{{ url_for('auth.devlogin') }}" class="btn btn-outline-primary btn-lg w-100 {% if has_provider %}mt-2{% endif %}">Dev Login</a>
      {% endif %}
    </div>
  </main>

  <ilw-footer slot="footer">
    <p slot="primary-unit"><a href="https://ncsa.illinois.edu">National Center for Supercomputing Applications</a></p>
    <p slot="site-name"><a href="/">{{ app_name }}</a></p>
  </ilw-footer>
</ilw-page>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
