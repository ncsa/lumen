{% extends "base.html" %}
{% block title %}Chat — {{ app_name }}{% endblock %}

{% block content %}
<div class="chat-page-layout">

  <!-- Sidebar: offcanvas on mobile, static inline on desktop -->
  <div class="chat-sidebar offcanvas offcanvas-start" tabindex="-1" id="chatSidebar">
    <div class="offcanvas-header d-md-none border-bottom">
      <h6 class="offcanvas-title fw-semibold mb-0">Conversations</h6>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close conversations panel"></button>
    </div>
    <div class="d-flex flex-column h-100">
      <div class="d-flex align-items-center px-3 py-2 border-bottom">
        <span class="fw-semibold small d-none d-md-inline">Conversations</span>
        <button class="btn btn-sm btn-primary ms-auto" id="new-chat-btn">+ New</button>
      </div>
      <div id="conv-list" class="conv-list overflow-auto flex-fill" role="list" aria-label="Conversations"></div>
    </div>
  </div>

  <!-- Chat main -->
  <div class="chat-main d-flex flex-column flex-fill">
    <div class="chat-header d-flex align-items-center gap-2 px-3 py-2 border-bottom flex-shrink-0">
      <!-- Mobile hamburger -->
      <button class="btn btn-sm btn-outline-secondary d-md-none"
              data-bs-toggle="offcanvas" data-bs-target="#chatSidebar"
              aria-controls="chatSidebar" aria-label="Open conversations menu">☰</button>
      <!-- Desktop collapse -->
      <button class="btn btn-sm btn-outline-secondary d-none d-md-inline-block"
              id="sidebar-toggle-btn" aria-label="Toggle sidebar">←</button>

      <label for="model-picker" class="form-label mb-0 fw-semibold">Model:</label>
      <select id="model-picker" class="form-select form-select-sm" style="max-width:280px">
        {% for model in active_models %}
        <option value="{{ model.model_name }}">{{ model.model_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div id="chat-messages" class="chat-messages flex-fill overflow-auto p-3" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <div class="chat-input-bar px-3 py-2 border-top flex-shrink-0">
      <form id="chat-form">
        <div id="attachment-row" class="mb-1 d-none" aria-live="polite"></div>
        <div class="d-flex gap-2">
          <label for="chat-input" class="visually-hidden">Message</label>
          <textarea id="chat-input" class="form-control" rows="2"
                    placeholder="Type your message… (Enter to send, Shift+Enter for newline)"></textarea>
          <label for="file-input" class="visually-hidden">Attach a file</label>
          <input type="file" id="file-input" class="visually-hidden"
                 accept=".txt,.md,.csv,.json,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.pdf,.png,.jpg,.jpeg,.gif,.webp">
          <button type="button" id="attach-btn" class="attach-btn" aria-label="Attach a file"><span aria-hidden="true">📎</span></button>
          <button type="submit" id="send-btn" class="btn btn-primary align-self-stretch">Send</button>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
(function () {
  // ── Chat layout height ───────────────────────────────────────
  const el = document.querySelector('.chat-page-layout');
  if (el) {
    const top = el.getBoundingClientRect().top;
    document.documentElement.style.setProperty('--chat-top', top + 'px');
  }

  // ── Math + Markdown rendering ───────────────────────────────
  function renderMarkdownWithMath(text) {
    const mathRegions = [];
    // Extract math regions before marked can mangle them.
    // Order matters: match $$ before $, \[..\] before \(..\).
    // Skip content inside backtick code spans/fences.
    function extract(re, display) {
      text = text.replace(re, (match, latex) => {
        const idx = mathRegions.length;
        mathRegions.push({ latex, display });
        return `%%MATH_${idx}%%`;
      });
    }
    // Strip code blocks/spans first so $ inside them isn't matched
    const codeBlocks = [];
    text = text.replace(/(```[\s\S]*?```|`[^`\n]+`)/g, (m) => {
      const idx = codeBlocks.length;
      codeBlocks.push(m);
      return `%%CODE_${idx}%%`;
    });
    extract(/\$\$([\s\S]+?)\$\$/g, true);
    extract(/\\\[([\s\S]+?)\\\]/g, true);
    extract(/\\\(([\s\S]+?)\\\)/g, false);
    // Inline $...$: require non-space after opening and before closing $,
    // and don't match lone $ (e.g. "$100").
    extract(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, false);
    // Restore code blocks
    text = text.replace(/%%CODE_(\d+)%%/g, (_, i) => codeBlocks[i]);

    let html = DOMPurify.sanitize(marked.parse(text));

    // Replace placeholders with rendered KaTeX
    html = html.replace(/%%MATH_(\d+)%%/g, (_, i) => {
      const { latex, display } = mathRegions[i];
      try {
        return katex.renderToString(latex, { displayMode: display, throwOnError: false });
      } catch (e) {
        return `<code>${escHtml(latex)}</code>`;
      }
    });
    return html;
  }

  const STORAGE_MODEL_KEY = "lumen_model";
  let chatHistory = [];
  let activeConversationId = null;
  let pendingAttachment = null; // { type:"image"|"doc", filename, base64?, mimeType?, text? }

  // ── Model picker ────────────────────────────────────────────────
  const picker = document.getElementById("model-picker");
  const savedModel = localStorage.getItem(STORAGE_MODEL_KEY);
  if (savedModel) {
    for (const opt of picker.options) {
      if (opt.value === savedModel) { picker.value = savedModel; break; }
    }
  }
  picker.addEventListener("change", () => localStorage.setItem(STORAGE_MODEL_KEY, picker.value));

  // ── Sidebar toggle (desktop) ────────────────────────────────────
  document.getElementById("sidebar-toggle-btn").addEventListener("click", () => {
    const sidebar = document.getElementById("chatSidebar");
    sidebar.classList.toggle("d-none");
    document.getElementById("sidebar-toggle-btn").textContent =
      sidebar.classList.contains("d-none") ? "→" : "←";
  });

  // ── New Chat ────────────────────────────────────────────────────
  document.getElementById("new-chat-btn").addEventListener("click", () => {
    activeConversationId = null;
    chatHistory = [];
    document.getElementById("chat-messages").innerHTML = "";
    document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
  });


  // ── Load conversations on page load ─────────────────────────────
  loadConversations();

  async function loadConversations() {
    try {
      const resp = await fetch("/chat/conversations");
      if (!resp.ok) return;
      const data = await resp.json();
      renderSidebar(data.conversations);
    } catch (e) {}
  }

  function renderSidebar(conversations) {
    const list = document.getElementById("conv-list");
    list.innerHTML = "";
    conversations.forEach(conv => {
      const isActive = conv.id === activeConversationId;
      const item = document.createElement("div");
      item.className = "conv-item d-flex align-items-center px-3 py-2" +
        (isActive ? " active" : "");
      item.dataset.id = conv.id;
      item.setAttribute("role", "listitem");
      item.setAttribute("tabindex", "0");
      item.setAttribute("aria-label", conv.title);
      item.setAttribute("aria-selected", isActive ? "true" : "false");

      const info = document.createElement("div");
      info.className = "flex-fill overflow-hidden me-1";
      info.innerHTML =
        `<div class="small fw-medium text-truncate">${escHtml(conv.title)}</div>` +
        `<div class="msg-meta text-truncate">${escHtml(conv.last_message_preview || "")}</div>`;

      const removeBtn = document.createElement("button");
      removeBtn.className = "conv-remove-btn btn btn-link btn-sm p-0 text-muted";
      removeBtn.setAttribute("aria-label", "Remove conversation: " + conv.title);
      removeBtn.textContent = "✕";
      removeBtn.addEventListener("click", e => {
        e.stopPropagation();
        removeConversation(conv.id);
      });

      item.appendChild(info);
      item.appendChild(removeBtn);
      item.addEventListener("click", () => loadConversation(conv.id));
      item.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          loadConversation(conv.id);
        }
      });
      list.appendChild(item);
    });
  }

  async function loadConversation(id) {
    try {
      const resp = await fetch(`/chat/conversations/${id}/messages`);
      if (!resp.ok) return;
      const data = await resp.json();
      activeConversationId = id;
      chatHistory = [];
      const container = document.getElementById("chat-messages");
      container.innerHTML = "";
      data.messages.forEach(msg => {
        chatHistory.push({ role: msg.role, content: msg.content });
        appendBubble(msg.role, msg.content, msg.meta || null, msg.created_at || null, false);
      });
      container.scrollTop = container.scrollHeight;
      document.querySelectorAll(".conv-item").forEach(el => {
        const match = parseInt(el.dataset.id) === id;
        el.classList.toggle("active", match);
        el.setAttribute("aria-selected", match ? "true" : "false");
      });
      document.getElementById("chat-input").focus();
    } catch (e) {}
  }

  async function removeConversation(id) {
    try {
      await fetch(`/chat/conversations/${id}`, { method: "DELETE" });
      if (id === activeConversationId) {
        activeConversationId = null;
        chatHistory = [];
        document.getElementById("chat-messages").innerHTML = "";
      }
      loadConversations();
      document.getElementById("new-chat-btn").focus();
    } catch (e) {}
  }

  // ── Bubble rendering ────────────────────────────────────────────
  function formatTimestamp(utcIsoStr) {
    // utcIsoStr is Python's isoformat() output (no 'Z'), or null for "just now"
    const d = utcIsoStr ? new Date(utcIsoStr + "Z") : new Date();
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function appendBubble(role, content, meta, timestamp, scroll = true, attachment = null) {
    const container = document.getElementById("chat-messages");
    const isUser = role === "user";

    const row = document.createElement("div");
    row.className = "d-flex mb-2 " + (isUser ? "justify-content-end" : "justify-content-start");

    const bubble = document.createElement("div");
    bubble.className = "chat-bubble " + (isUser ? "chat-bubble-user" : "chat-bubble-assistant");
    if (isUser) {
      // Vision content array (live message with image)
      if (Array.isArray(content)) {
        for (const block of content) {
          if (block.type === "image_url") {
            const img = document.createElement("img");
            img.src = block.image_url.url;
            img.className = "bubble-img";
            img.alt = attachment ? attachment.filename : "Attached image";
            bubble.appendChild(img);
          } else if (block.type === "text" && block.text) {
            bubble.appendChild(document.createTextNode(block.text));
          }
        }
      } else if (typeof content === "string" && content.startsWith("[Document: ")) {
        // Stored doc message — show badge + user question
        const newline = content.indexOf("\n");
        const header = newline > -1 ? content.slice(0, newline) : content;
        const rest = content.indexOf("\n\n---\n\n") > -1
          ? content.slice(content.indexOf("\n\n---\n\n") + 7)
          : "";
        const chip = document.createElement("span");
        chip.className = "attach-chip d-inline-flex mb-1";
        chip.setAttribute("aria-label", header);
        chip.textContent = header;
        bubble.appendChild(chip);
        if (rest) {
          bubble.appendChild(document.createElement("br"));
          bubble.appendChild(document.createTextNode(rest));
        }
      } else if (typeof content === "string" && content.startsWith("[Image: ")) {
        // Stored image placeholder (after page reload)
        const newline = content.indexOf("\n");
        const header = newline > -1 ? content.slice(0, newline) : content;
        const rest = newline > -1 ? content.slice(newline + 1).trim() : "";
        const chip = document.createElement("span");
        chip.className = "attach-chip d-inline-flex mb-1";
        chip.setAttribute("aria-label", header);
        chip.textContent = header;
        bubble.appendChild(chip);
        if (rest) {
          bubble.appendChild(document.createElement("br"));
          bubble.appendChild(document.createTextNode(rest));
        }
      } else {
        bubble.appendChild(document.createTextNode(content));
      }
    } else {
      bubble.innerHTML = renderMarkdownWithMath(content);
    }

    const ts = document.createElement("small");
    ts.className = "msg-meta d-flex align-items-center gap-1";
    ts.appendChild(document.createTextNode(formatTimestamp(timestamp)));

    if (!isUser && meta) {
      const infoIcon = document.createElement("span");
      infoIcon.className = "info-icon";
      infoIcon.textContent = "ⓘ";
      infoIcon.setAttribute("role", "button");
      infoIcon.setAttribute("aria-label", "Message details");
      infoIcon.setAttribute("data-bs-toggle", "popover");
      infoIcon.setAttribute("data-bs-trigger", "click");
      infoIcon.setAttribute("data-bs-placement", "top");
      infoIcon.setAttribute("data-bs-html", "true");
      infoIcon.setAttribute("data-bs-content", buildPopoverContent(meta));
      infoIcon.setAttribute("tabindex", "0");
      ts.appendChild(infoIcon);
      new bootstrap.Popover(infoIcon, { container: "body" });
    }

    const wrapper = document.createElement("div");
    wrapper.className = "d-flex flex-column " + (isUser ? "align-items-end" : "align-items-start");
    wrapper.style.maxWidth = "65%";
    wrapper.appendChild(bubble);
    wrapper.appendChild(ts);
    row.appendChild(wrapper);

    container.appendChild(row);
    if (scroll) container.scrollTop = container.scrollHeight;
  }

  function buildPopoverContent(meta) {
    const lines = [];
    if (meta.input_tokens != null)       lines.push(`<b>Input tokens:</b> ${meta.input_tokens}`);
    if (meta.output_tokens != null)      lines.push(`<b>Output tokens:</b> ${meta.output_tokens}`);
    if (meta.duration != null)           lines.push(`<b>Duration:</b> ${meta.duration.toFixed(2)}s`);
    if (meta.output_speed != null)       lines.push(`<b>Speed:</b> ${meta.output_speed.toFixed(1)} tok/s`);
    return lines.join("<br>");
  }

  function addTypingIndicator() {
    const container = document.getElementById("chat-messages");
    const row = document.createElement("div");
    row.className = "d-flex mb-2 justify-content-start";
    row.id = "typing-indicator";
    row.innerHTML =
      `<div class="chat-bubble chat-bubble-assistant py-2 px-3">` +
      `<span class="visually-hidden">Assistant is typing</span>` +
      `<span class="typing-dot" aria-hidden="true">●</span>` +
      `<span class="typing-dot" aria-hidden="true" style="animation-delay:.2s">●</span>` +
      `<span class="typing-dot" aria-hidden="true" style="animation-delay:.4s">●</span>` +
      `</div>`;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // ── File attachment ─────────────────────────────────────────────
  function showChip(attachment) {
    const row = document.getElementById("attachment-row");
    row.innerHTML = "";
    row.classList.remove("d-none");
    const chip = document.createElement("div");
    chip.className = "attach-chip";
    if (attachment.type === "image") {
      const thumb = document.createElement("img");
      thumb.className = "attach-thumb";
      thumb.src = attachment.base64;
      thumb.alt = "";
      chip.appendChild(thumb);
    }
    const name = document.createElement("span");
    name.className = "chip-name";
    name.textContent = attachment.filename;
    const removeBtn = document.createElement("button");
    removeBtn.className = "chip-remove";
    removeBtn.type = "button";
    removeBtn.textContent = "✕";
    removeBtn.setAttribute("aria-label", "Remove attachment: " + attachment.filename);
    removeBtn.addEventListener("click", () => {
      pendingAttachment = null;
      row.innerHTML = "";
      row.classList.add("d-none");
      document.getElementById("file-input").value = "";
      document.getElementById("chat-input").focus();
    });
    chip.appendChild(name);
    chip.appendChild(removeBtn);
    row.appendChild(chip);
  }

  function setAttachmentStatus(msg, isError = false) {
    const row = document.getElementById("attachment-row");
    row.innerHTML = "";
    row.classList.remove("d-none");
    const notice = document.createElement("span");
    notice.className = isError ? "text-danger small" : "text-muted small";
    if (isError) notice.setAttribute("role", "alert");
    notice.textContent = msg;
    row.appendChild(notice);
    if (isError) {
      let timer = setTimeout(() => dismiss(), 20000);
      function dismiss() { if (row.contains(notice)) { row.innerHTML = ""; row.classList.add("d-none"); } }
      notice.addEventListener("mouseenter", () => clearTimeout(timer));
      notice.addEventListener("focus",      () => clearTimeout(timer));
      notice.addEventListener("mouseleave", () => { timer = setTimeout(dismiss, 20000); });
      notice.addEventListener("blur",       () => { timer = setTimeout(dismiss, 20000); });
    }
  }

  async function handleFileAttach(file) {
    if (!file) return;
    const attachBtn = document.getElementById("attach-btn");
    attachBtn.disabled = true;
    setAttachmentStatus("Uploading " + file.name + "…");
    const formData = new FormData();
    formData.append("file", file);
    try {
      const resp = await fetch("/chat/upload", { method: "POST", body: formData });
      const data = await resp.json();
      if (!resp.ok) {
        setAttachmentStatus("Upload error: " + (data.error || resp.statusText), true);
        document.getElementById("file-input").value = "";
        return;
      }
      if (data.type === "image") {
        pendingAttachment = { type: "image", filename: data.filename, base64: data.data_url };
      } else {
        pendingAttachment = { type: "doc", filename: data.filename, text: data.text };
      }
      showChip(pendingAttachment);
      document.getElementById("chat-input").focus();
    } catch (err) {
      setAttachmentStatus("Upload failed: " + err.message, true);
      document.getElementById("file-input").value = "";
    } finally {
      attachBtn.disabled = false;
    }
  }

  document.getElementById("attach-btn").addEventListener("click", () => {
    document.getElementById("file-input").click();
  });
  document.getElementById("file-input").addEventListener("change", (e) => {
    handleFileAttach(e.target.files[0]);
  });

  // Drag-and-drop on input bar
  const inputBar = document.querySelector(".chat-input-bar");
  inputBar.addEventListener("dragover", (e) => {
    e.preventDefault();
    inputBar.classList.add("drag-over");
  });
  inputBar.addEventListener("dragleave", (e) => {
    if (!inputBar.contains(e.relatedTarget)) inputBar.classList.remove("drag-over");
  });
  inputBar.addEventListener("drop", (e) => {
    e.preventDefault();
    inputBar.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) handleFileAttach(file);
  });

  // ── Send ────────────────────────────────────────────────────────
  document.getElementById("chat-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const input = document.getElementById("chat-input");
    const userText = input.value.trim();
    if (!userText && !pendingAttachment) return;

    const model = picker.value;
    if (!model) { alert("Please select a model."); return; }

    let content;
    if (pendingAttachment && pendingAttachment.type === "image") {
      content = [
        { type: "image_url", image_url: { url: pendingAttachment.base64 } },
        { type: "text", text: userText || "What is in this image?" },
      ];
    } else if (pendingAttachment && pendingAttachment.type === "doc") {
      const docBlock = `[Document: ${pendingAttachment.filename}]\n\n${pendingAttachment.text}`;
      content = userText ? `${docBlock}\n\n---\n\n${userText}` : docBlock;
    } else {
      content = userText;
    }

    // Clear attachment before send
    const attachedForDisplay = pendingAttachment;
    pendingAttachment = null;
    document.getElementById("attachment-row").innerHTML = "";
    document.getElementById("attachment-row").classList.add("d-none");
    document.getElementById("file-input").value = "";

    input.value = "";
    chatHistory.push({ role: "user", content });
    appendBubble("user", content, null, null, true, attachedForDisplay);
    addTypingIndicator();

    const sendBtn = document.getElementById("send-btn");
    sendBtn.disabled = true;

    try {
      const resp = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: chatHistory, model, conversation_id: activeConversationId }),
      });

      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        removeTypingIndicator();
        appendBubble("assistant", "Error: " + (data.error || resp.statusText), null, null);
        return;
      }

      const container = document.getElementById("chat-messages");
      let streamBubble = null, streamWrapper = null;
      let fullText = "";
      let finalReceived = false;

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop();
        for (const part of parts) {
          if (!part.startsWith("data: ")) continue;
          let event;
          try { event = JSON.parse(part.slice(6).trim()); } catch { continue; }

          if (event.error) {
            removeTypingIndicator();
            if (streamWrapper) streamWrapper.closest(".d-flex.mb-2").remove();
            appendBubble("assistant", "Error: " + event.error, null, null);
            finalReceived = true;
            break;
          }

          if (event.chunk !== undefined) {
            if (!streamBubble) {
              removeTypingIndicator();
              const row = document.createElement("div");
              row.className = "d-flex mb-2 justify-content-start";
              streamWrapper = document.createElement("div");
              streamWrapper.className = "d-flex flex-column align-items-start";
              streamWrapper.style.maxWidth = "65%";
              streamBubble = document.createElement("div");
              streamBubble.className = "chat-bubble chat-bubble-assistant";
              streamWrapper.appendChild(streamBubble);
              row.appendChild(streamWrapper);
              container.appendChild(row);
            }
            fullText += event.chunk;
            streamBubble.innerHTML = renderMarkdownWithMath(fullText);
            container.scrollTop = container.scrollHeight;
          }

          if (event.done) {
            finalReceived = true;
            if (streamBubble) {
              streamBubble.innerHTML = renderMarkdownWithMath(event.reply || fullText);
            }
            chatHistory.push({ role: "assistant", content: event.reply || fullText });
            const meta = {
              input_tokens: event.input_tokens,
              output_tokens: event.output_tokens,
              duration: event.duration,
              time_to_first_token: event.time_to_first_token,
              output_speed: event.output_speed,
            };
            const ts = document.createElement("small");
            ts.className = "msg-meta d-flex align-items-center gap-1";
            ts.appendChild(document.createTextNode(formatTimestamp(null)));
            if (meta.input_tokens != null) {
              const infoIcon = document.createElement("span");
              infoIcon.className = "info-icon";
              infoIcon.textContent = "ⓘ";
              infoIcon.setAttribute("role", "button");
              infoIcon.setAttribute("aria-label", "Message details");
              infoIcon.setAttribute("data-bs-toggle", "popover");
              infoIcon.setAttribute("data-bs-trigger", "click");
              infoIcon.setAttribute("data-bs-placement", "top");
              infoIcon.setAttribute("data-bs-html", "true");
              infoIcon.setAttribute("data-bs-content", buildPopoverContent(meta));
              infoIcon.setAttribute("tabindex", "0");
              ts.appendChild(infoIcon);
              new bootstrap.Popover(infoIcon, { container: "body" });
            }
            if (streamWrapper) streamWrapper.appendChild(ts);
            container.scrollTop = container.scrollHeight;
            if (event.conversation_id) {
              activeConversationId = event.conversation_id;
              loadConversations();
            }
          }
        }
        if (finalReceived) break;
      }

      // Stream ended without a done event — render whatever we got
      if (!finalReceived && fullText) {
        if (streamBubble) streamBubble.innerHTML = renderMarkdownWithMath(fullText);
        chatHistory.push({ role: "assistant", content: fullText });
      }

    } catch (err) {
      removeTypingIndicator();
      appendBubble("assistant", "Network error: " + err.message, null, null);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  document.getElementById("chat-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("chat-form").dispatchEvent(
        new Event("submit", { cancelable: true, bubbles: true })
      );
    }
  });

  // Dismiss popovers on outside click
  document.addEventListener("click", function (e) {
    if (!e.target.classList.contains("info-icon")) {
      document.querySelectorAll(".info-icon[data-bs-toggle='popover']").forEach(el => {
        const pop = bootstrap.Popover.getInstance(el);
        if (pop) pop.hide();
      });
    }
  });
})();
</script>
{% endblock %}
